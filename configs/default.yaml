# ─── Gaussian Tokenizer (RVQ-VAE) ───
tokenizer:
  input_dim: 59          # per-Gaussian parameter count
  latent_dim: 256
  num_codebooks: 4       # RVQ depth
  codebook_size: 1024    # codes per codebook
  code_dim: 64
  commitment_weight: 0.25
  ema_decay: 0.99        # EMA codebook update

# ─── Top-Down Encoder ───
encoder:
  backbone: "dinov2_vitb14"
  freeze_backbone: true
  proj_dim: 768

# ─── Autoregressive Transformer ───
transformer:
  num_layers: 24
  hidden_dim: 768
  num_heads: 12
  mlp_ratio: 4
  dropout: 0.1
  max_seq_len: 12288
  num_special_tokens: 3  # BOS, EOS, SEP
  cross_attn_every_n: 2  # cross-attention every N layers

# ─── Data ───
data:
  image_size: 256
  max_gaussians: 2048
  hilbert_bits: 10       # 2^10 = 1024 resolution per axis
  sh_degree: 3

# ─── Training ───
training:
  # Phase 1: tokenizer
  tokenizer_lr: 3.0e-4
  tokenizer_batch_size: 4096
  tokenizer_epochs: 100

  # Phase 2: transformer
  lr: 3.0e-4
  weight_decay: 0.05
  warmup_steps: 2000
  batch_size: 32
  max_epochs: 200
  grad_clip: 1.0
  curriculum_stages: [256, 512, 1024, 2048]

  # Phase 3: rendering fine-tune
  render_loss_weight: 0.1
  render_finetune_epochs: 50

# ─── Inference ───
inference:
  temperature: 0.9
  top_k: 50
  top_p: 0.95
  cfg_scale: 3.0
  cfg_dropout: 0.1      # conditioning dropout during training
